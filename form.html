<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 - Week05 - Form</title>
    <meta name="description" content="This project at week05 will help us create a dynamic form review for each of the product you have in your site. ">
    <meta name="author" content="Rosendo Cuyasen Jr">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form-small.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>    
    <main>
        <form method="get" action="review.html" class="wf1">
            <fieldset>
            <label for="product-name">Product Name</label>
            <select name="productName" id="product-name" required>
            <option value="" id="placeholder" disabled selected>Select a Product ...</option>
            <option value="software">Software Development</option>
            <option value="creative">Creative Professional</option>
            <option value="info">Information Technology</option>
            <option value="data">Data Professional</option>
            <option value="construction">Construction</option>
            <option value="manufacturing">Manufacturing</option>
            <option value="business">Business</option>
            <option value="security">Cyber Security</option>
        </select>

                <label>Overall Rating</label>
                <div class="star-rating">
                    <input type="radio" name="stars" id="star-5" value="5" required><label for="star-5"></label>
                    <input type="radio" name="stars" id="star-4" value="4" required><label for="star-4"></label>
                    <input type="radio" name="stars" id="star-3" value="3" required><label for="star-3"></label>
                    <input type="radio" name="stars" id="star-2" value="2" required><label for="star-2"></label>
                    <input type="radio" name="stars" id="star-1" value="1" required><label for="star-1"></label>
                </div>

                <label for="install-date">Date of Installation</label>
                <input type="date" name="completeDate" id="install-date">

                <label>Which features did you find useful?</label>
                <label><input type="checkbox" id="feature-durability" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" id="feature-ease" name="features" value="ease"> Ease of Use</label>
                <label><input type="checkbox" id="feature-performace" name="features" value="performance"> Performance</label>
                <label><input type="checkbox" id="feature-design" name="features" value="design"> Design</label>
                
                <label for="review-text">Written Review (Optional)</label>
                <textarea name="review" id="review-text" rows="4"></textarea>

                <label for="user-name">Your Name</label>
                <input type="text" name="userName" id="user-name">

                <input type="submit" value="Post Review">
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Rosendo Cuyasen - Cebu, Philippines 🇵🇭</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
