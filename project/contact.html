</head>

<body>
    <header>
        <h1>DDF</h1>    
        <button id="menu"></button>
        <nav class="navigation">
            <ul>
                <li><a href="siteplan.html" id="home" title="Home">Home</a></li>
                <li><a href="about.html" id="about" title="About">About</a></li>
                <li><a href="#" id="projects" title="Projects">Projects</a></li>
                <li><a href="#" id="services" title="Service">Services</a></li>
                <li><a href="contact.html" id="contactus" title="Contactus">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>
        <h1>Contact Us</h1>
        <form methed="get" action="thankyou.html" class="wf1">

            <fieldset>
                <legend>Applicant Information</legend>
                <label> First Name* <input type="text" name="fname" required></label>
                <label> Last Name* <input type="text" name="lname" required></label>
                <label> Phone <input type="tel" name="phone" placeholder="+12355512323"></label>
                <label> Email <input type="email" name="email" placeholder="someone@gmail.com" required></label>
        

            </fieldset>

            <fieldset>
                <legend>Services </legend>
                <div>Audience</div>
                <label><input type="radio" name="audience" value="beginner">Owner</label>
                <label><input type="radio" name="audience" value="intermediate">Company</label>
                <label><input type="radio" name="audience" value="advance">Organization</label>

                <div>Service Needed</div>
                <label><input type="checkbox" name="design" value="yes">Design</label>
                <label><input type="checkbox" name="construction" value="yes">Construction</label>
                <label><input type="checkbox" name="Structure" value="yes">Structure</label>
            </fieldset>
            <fieldset>

                <legend>Funding</legend>
                <label>Anticipated Completion Date <input type="date" name="completeDate"></label>
                <label>Course Subject 
                    <select name="subject">
                    <option name="">Please select &#9662;</option>
                    <option value="software">Software Development</option>
                    <option value="creative">Creative Professional</option>
                    <option value="info">Information Technology</option>
                    <option value="data">Data Professional</option>
                    <option value="construction">Construction</option>
                    <option value="manufacturing">Manufacturing</option>
                    <option value="business">Business</option>
                    <option value="security">Cyber Security</option>
                    </select>
                </label>

                <label>How many Authors<input type="number" name="authors"></label>

            </fieldset>
            <input type="submit" value="Process my Course">
        </form>
          

    </main>
    
    <footer>
        <div id="footer">
            <p>
                &copy; <span id="currentyear"></span> Rosendo Cuyasen - Cebu, Philippines 🇵🇭
            </p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>
</html>
